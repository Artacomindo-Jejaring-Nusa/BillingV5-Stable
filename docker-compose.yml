services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    command: --server-id=1 --log-bin=mysql-bin --binlog-format=ROW --binlog-do-db=billing_revaktor
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: billing_revaktor
      SKIP_DATA_IMPORT: ${SKIP_DATA_IMPORT:-false}
    ports:
      - "3306:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./docker/mysql/master/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/mysql/master/init.sql:/docker-entrypoint-initdb.d/00-init.sql
      - ./docker/mysql/master/import-data.sh:/docker-entrypoint-initdb.d/01-import-data.sh
      - ./DataTerbaru2026.sql:/data/production-data.sql
    networks:
      - billing_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-slave:
    image: mysql:8.0
    container_name: mysql-slave
    command: --server-id=2 --relay-log=mysql-relay-bin --log-bin=mysql-bin --binlog-format=ROW --replicate-do-db=billing_revaktor
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: billing_revaktor
    ports:
      - "3307:3306"
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ./docker/mysql/slave/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./docker/mysql/slave/init-slave.sh:/docker-entrypoint-initdb.d/00-init-slave.sh
      - ./docker/mysql/slave/import-data.sh:/docker-entrypoint-initdb.d/01-import-data.sh
      - ./DataTerbaru2026.sql:/data/production-data.sql
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - billing_network

  redis:
    image: redis:7-alpine
    container_name: billing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - billing_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: billing-backend-1
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=mysql://${DB_USER:-root}:${DB_PASSWORD:-root}@mysql-master:3306/billing_revaktor
      - DB_SLAVE_URL=mysql://${DB_USER:-root}:${DB_PASSWORD:-root}@mysql-slave:3306/billing_revaktor
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
    volumes:
      - ./backend/uploads:/app/uploads
      - ./Notif Sound:/app/Notif Sound
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - billing_network
    restart: always

  backend2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: billing-backend-2
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=mysql://${DB_USER:-root}:${DB_PASSWORD:-root}@mysql-master:3306/billing_revaktor
      - DB_SLAVE_URL=mysql://${DB_USER:-root}:${DB_PASSWORD:-root}@mysql-slave:3306/billing_revaktor
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
    volumes:
      - ./backend/uploads:/app/uploads
      - ./Notif Sound:/app/Notif Sound
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - billing_network
    restart: always

  nginx-proxy:
    image: nginx:alpine
    container_name: billing-nginx-proxy
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      backend1:
        condition: service_started
      backend2:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - billing_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v1
    container_name: billing-frontend
    ports:
      - "3000:80"
    networks:
      - billing_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: billing-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    networks:
      - billing_network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: billing-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - billing_network
    restart: unless-stopped

  mysql-exporter:
    image: prom/mysqld-exporter:v0.14.0
    container_name: billing-mysql-exporter
    ports:
      - "9104:9104"
    environment:
      - DATA_SOURCE_NAME=root:root@(mysql-master:3306)/
    networks:
      - billing_network
    restart: unless-stopped

networks:
  billing_network:
    driver: bridge

volumes:
  mysql_master_data:
  mysql_slave_data:
  redis_data:
