openapi: 3.0.3
info:
  title: Billing Revaktor API Documentation
  description: Complete and comprehensive API reference for the Billing Revaktor backend system, powered by Go/Gin, GORM, and Scalar.
  version: 5.0.12
servers:
  - url: /api/v1
    description: Current Base URL relative path (works with any domain or Cloudflare subdomain)
paths:
  /auth/token:
    post:
      tags:
        - Auth
      summary: Login User / Get Access Token
      description: Exchanges credentials for JWT access and refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: admin@example.com
                password:
                  type: string
                  format: password
                  example: password
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh Access Token
      description: Generates a new access token using a valid refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  example: refresh_token_string
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout User
      description: Blacklists the provided refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Logged out successfully

  /auth/logout-all:
    post:
      tags:
        - Auth
      summary: Logout All Devices
      description: Revokes and blacklists all active tokens and sessions for the current logged-in user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out all sessions successfully

  /auth/password-requirements:
    get:
      tags:
        - Auth
      summary: Get Password Requirements
      description: Returns password policy rules (e.g., minimum length, uppercase, digits).
      responses:
        '200':
          description: Success

  /users/me:
